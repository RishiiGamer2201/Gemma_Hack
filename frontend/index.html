<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <!--
      Offline hardening: block every remote subresource origin.
      Only same-origin assets and same-origin XHR (proxied /api) are permitted.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; form-action 'none'; frame-ancestors 'none'; base-uri 'self'"
    />
    <title>Nyaya Navigator (offline)</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Nyaya Navigator needs JavaScript enabled. It still runs entirely on this
      machine; nothing is sent to the internet.
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
